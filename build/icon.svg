<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6B4EE6"/>
      <stop offset="100%" stop-color="#2E1A8C"/>
    </linearGradient>
    <linearGradient id="bar1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4F9EFF"/>
      <stop offset="100%" stop-color="#7B5CFF"/>
    </linearGradient>
    <linearGradient id="bar2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FF9F4A"/>
      <stop offset="100%" stop-color="#FF6B6B"/>
    </linearGradient>
    <linearGradient id="bar3" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#43D98C"/>
      <stop offset="100%" stop-color="#4FC3F7"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="white" stop-opacity="0.12"/>
      <stop offset="60%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="round">
      <rect width="1024" height="1024" rx="220" ry="220"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" rx="220" ry="220" fill="url(#bg)"/>

  <!-- Inner shine -->
  <rect width="1024" height="1024" rx="220" ry="220" fill="url(#shine)"/>

  <!-- Activity dot (top-right) -->
  <circle cx="780" cy="244" r="38" fill="#1A1040" opacity="0.4"/>
  <circle cx="780" cy="244" r="26" fill="#43D98C"/>

  <!-- Bar 1 — 76% (blue/purple) -->
  <rect x="112" y="380" width="800" height="68" rx="34" fill="white" opacity="0.12"/>
  <rect x="112" y="380" width="608" height="68" rx="34" fill="url(#bar1)"/>

  <!-- Bar 2 — 51% (orange/red) -->
  <rect x="112" y="504" width="800" height="68" rx="34" fill="white" opacity="0.12"/>
  <rect x="112" y="504" width="408" height="68" rx="34" fill="url(#bar2)"/>

  <!-- Bar 3 — 27% (green/teal) -->
  <rect x="112" y="628" width="800" height="68" rx="34" fill="white" opacity="0.12"/>
  <rect x="112" y="628" width="216" height="68" rx="34" fill="url(#bar3)"/>

  <!-- Label lines (white rectangles simulating text) -->
  <rect x="112" y="340" width="180" height="24" rx="12" fill="white" opacity="0.35"/>
  <rect x="112" y="464" width="140" height="24" rx="12" fill="white" opacity="0.35"/>
  <rect x="112" y="588" width="160" height="24" rx="12" fill="white" opacity="0.35"/>

  <!-- Bottom label / reset line -->
  <rect x="112" y="748" width="300" height="22" rx="11" fill="white" opacity="0.2"/>
  <rect x="424" y="748" width="180" height="22" rx="11" fill="white" opacity="0.2"/>

</svg>
